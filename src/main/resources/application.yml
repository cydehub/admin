server:
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful

spring:
  application:
    name: stockzeno-wms
  lifecycle:
    timeout-per-shutdown-phase: 30s
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stockzeno}
    username: ${DB_USER:stockzeno}
    password: ${DB_PASSWORD:stockzeno}
  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: simple

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      show-components: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /docs
    operationsSorter: method

stockzeno:
  app:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
  security:
    jwt:
      issuer: ${JWT_ISSUER:stockzeno}
      secret: ${JWT_SECRET:}
      access-token-ttl: ${JWT_ACCESS_TTL:PT24H}
      refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
      email-verification-ttl: ${EMAIL_VERIFICATION_TTL:PT24H}
  jobs:
    expiry-cron: ${EXPIRY_CRON:0 0 * * * *}
    low-stock-cron: ${LOW_STOCK_CRON:0 */30 * * * *}
    near-expiry-days: ${NEAR_EXPIRY_DAYS:30}
    low-stock-cooldown: ${LOW_STOCK_COOLDOWN:PT24H}
  webhooks:
    max-attempts: ${WEBHOOK_MAX_ATTEMPTS:3}
  notifications:
    enabled: ${NOTIFY_ENABLED:true}
    provider: ${NOTIFY_PROVIDER:sendgrid}
    email-to: ${NOTIFY_EMAIL_TO:}
    sms-to: ${NOTIFY_SMS_TO:}
    email-from: ${NOTIFY_EMAIL_FROM:}
    sms-from: ${NOTIFY_SMS_FROM:}
    sendgrid-api-key: ${SENDGRID_API_KEY:}
    twilio-account-sid: ${TWILIO_ACCOUNT_SID:}
    twilio-auth-token: ${TWILIO_AUTH_TOKEN:}
  seed:
    enabled: ${SEED_DEMO_DATA:true}
